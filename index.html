<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Tic-Tac-Toe</h1>
        
        <div class="game-info">
            <div class="mode-selector">
                <button id="two-player-btn" class="mode-btn active">Two Player</button>
                <button id="ai-player-btn" class="mode-btn">vs AI</button>
            </div>
            
            <div class="game-status">
                <p id="status-text">Player X's turn</p>
                <div class="score">
                    <span>X: <span id="score-x">0</span></span>
                    <span>O: <span id="score-o">0</span></span>
                    <span>Draws: <span id="score-draw">0</span></span>
                </div>
            </div>
        </div>

        <div class="game-board">
            <div class="board" id="board">
                <div class="cell" data-index="0"></div>
                <div class="cell" data-index="1"></div>
                <div class="cell" data-index="2"></div>
                <div class="cell" data-index="3"></div>
                <div class="cell" data-index="4"></div>
                <div class="cell" data-index="5"></div>
                <div class="cell" data-index="6"></div>
                <div class="cell" data-index="7"></div>
                <div class="cell" data-index="8"></div>
            </div>
        </div>

        <div class="controls">
            <button id="reset-btn" class="control-btn">Reset Game</button>
            <button id="new-game-btn" class="control-btn">New Game</button>
        </div>

        <div id="winner-modal" class="modal hidden">
            <div class="modal-content">
                <h2 id="winner-text">Player X Wins!</h2>
                <div class="modal-buttons">
                    <button id="play-again-btn" class="modal-btn">Play Again</button>
                    <button id="close-modal-btn" class="modal-btn">Close</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
